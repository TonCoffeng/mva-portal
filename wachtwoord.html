<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nieuw wachtwoord · MvA Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#1A2B5F;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;color:#1A2B5F}
.card{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.mark{width:40px;height:40px;background:#E8500A;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:22px;color:#fff}
.brand-name{font-size:15px;font-weight:600;color:#1A2B5F}
.brand-sub{font-size:10px;color:#B0ACA2;letter-spacing:.07em;text-transform:uppercase}
h2{font-family:'DM Serif Display',serif;font-weight:400;font-size:22px;margin-bottom:.5rem}
p{font-size:14px;color:#6B6760;line-height:1.5;margin-bottom:1rem}
input{width:100%;height:42px;border:1.5px solid #E2DFD8;border-radius:8px;padding:0 12px;font-size:14px;margin-bottom:.75rem;outline:none;font-family:inherit}
input:focus{border-color:#1A2B5F}
button,.knop{display:inline-block;width:100%;height:44px;line-height:44px;text-align:center;background:#1A2B5F;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;margin-top:.25rem}
.err{color:#E8500A;font-size:13px;min-height:18px;margin-bottom:.25rem;text-align:center}
.laden{font-size:14px;color:#6B6760;text-align:center;padding:1rem}
</style>
</head>
<body>
<div class="card" id="main">
  <div class="laden">Laden&hellip;</div>
</div>

<script type="module">
const SB_URL='https://olfcrzusdkijxroxvsgm.supabase.co';
const SB_KEY='sb_publishable_0OmJOAM_XZWCW8e_vgx2Qg_L3tdRsc4';
const main=document.getElementById('main');
const brand='<div class="brand"><div class="mark">M</div><div><div class="brand-name">MvA Intelligence</div><div class="brand-sub">Makelaars Van Amsterdam</div></div></div>';
function toon(html){ main.innerHTML = brand + html; }

try {
  const { createBrowserClient } = await import('https://esm.sh/@supabase/ssr@0.5.2');
  const sb = createBrowserClient(SB_URL, SB_KEY, {
    cookieOptions: { domain: '.makelaarsvan.nl', path: '/', sameSite: 'lax', secure: true, maxAge: 60*60*24*30 }
  });

  function toonFormulier(){
    toon('<h2>Kies een nieuw wachtwoord</h2>'
      + '<input id="pw1" type="password" placeholder="Nieuw wachtwoord (min. 8 tekens)" autocomplete="new-password">'
      + '<input id="pw2" type="password" placeholder="Herhaal wachtwoord" autocomplete="new-password">'
      + '<div class="err" id="err"></div>'
      + '<button id="opslaan">Wachtwoord opslaan</button>');
    document.getElementById('opslaan').addEventListener('click', async () => {
      const err=document.getElementById('err');
      const a=document.getElementById('pw1').value, b=document.getElementById('pw2').value;
      err.textContent='';
      if(a.length<8){ err.textContent='Minimaal 8 tekens.'; return; }
      if(a!==b){ err.textContent='De wachtwoorden komen niet overeen.'; return; }
      err.textContent='Bezig met opslaan...';
      const { error } = await sb.auth.updateUser({ password: a });
      if(error){ err.textContent='Opslaan mislukt: '+(error.message||'probeer opnieuw'); return; }
      try { await sb.auth.signOut(); } catch(e){}
      toon('<h2>Gelukt &#10003;</h2><p>Je wachtwoord is gewijzigd. Je kunt nu inloggen met je nieuwe wachtwoord.</p><a class="knop" href="/">Naar inloggen</a>');
    });
  }

  async function heeftHerstelsessie(){
    let { data: { session } } = await sb.auth.getSession();
    if (session) return true;
    const code = new URLSearchParams(location.search).get('code');
    if (code) {
      try { await sb.auth.exchangeCodeForSession(code); } catch(e){}
      ({ data: { session } } = await sb.auth.getSession());
    }
    return !!session;
  }

  sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') toonFormulier();
  });

  if (await heeftHerstelsessie()) {
    toonFormulier();
  } else {
    toon('<h2>Link verlopen of ongeldig</h2><p>Open deze pagina via de link in je herstelmail. Geen mail ontvangen? Vraag een nieuwe aan op het inlogscherm via &bdquo;Wachtwoord vergeten?&rdquo;.</p><a class="knop" href="/">Naar inloggen</a>');
  }
} catch(e){
  console.error('Reset-pagina faalde:', e);
  document.getElementById('main').innerHTML = brand + '<h2>Er ging iets mis</h2><p>Ververs de pagina of probeer het later opnieuw.</p><a class="knop" href="/">Naar inloggen</a>';
}
</script>
</body>
</html>
