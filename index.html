<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MvA Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A2B5F;
    --navy-dark: #111e45;
    --navy-light: #25346c;
    --orange: #E8500A;
    --orange-light: #ff6600;
    --white: #ffffff;
    --grey-light: #f4f5f8;
    --grey-mid: #e8eaf0;
    --grey-text: #6b7280;
    --text: #1a1a2e;
    --success: #10b981;
    --amber: #f59e0b;
    --purple: #7c3aed;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Roboto', sans-serif;
    background: var(--navy-dark);
    min-height: 100vh;
    color: var(--white);
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy-dark);
    position: relative;
    overflow: hidden;
  }

  #login-screen::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,80,10,0.12) 0%, transparent 70%);
    top: -100px; right: -100px;
    border-radius: 50%;
  }
  #login-screen::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(37,52,108,0.6) 0%, transparent 70%);
    bottom: -80px; left: -80px;
    border-radius: 50%;
  }

  .login-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 20px;
    padding: 56px 48px;
    width: 420px;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(20px);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .login-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 40px;
  }

  .logo-gamma {
    width: 48px; height: 48px;
    background: var(--orange);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 28px; font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .logo-text { line-height: 1.1; }
  .logo-text .brand { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
  .logo-text .sub   { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.45); letter-spacing: 0.08em; text-transform: uppercase; }

  .login-title {
    font-size: 24px; font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .login-sub {
    font-size: 14px; color: rgba(255,255,255,0.45);
    margin-bottom: 36px;
  }

  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 14px 16px;
    color: white;
    font-family: 'Roboto', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-group input:focus {
    border-color: var(--orange);
    background: rgba(255,255,255,0.09);
  }
  .form-group input::placeholder { color: rgba(255,255,255,0.25); }

  .login-btn {
    width: 100%;
    background: var(--orange);
    border: none;
    border-radius: 10px;
    padding: 15px;
    color: white;
    font-family: 'Roboto', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .login-btn:hover { background: var(--orange-light); }
  .login-btn:active { transform: scale(0.99); }

  .login-hint {
    margin-top: 24px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.07);
  }
  .login-hint p { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
  .login-hint .hint-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .hint-tag {
    font-size: 11px;
    background: rgba(255,255,255,0.07);
    border-radius: 6px;
    padding: 4px 10px;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: background 0.2s;
  }
  .hint-tag:hover { background: rgba(255,255,255,0.14); color: white; }

  .login-error {
    background: rgba(232,80,10,0.15);
    border: 1px solid rgba(232,80,10,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #fca97a;
    margin-top: 14px;
    display: none;
  }

  /* ── DASHBOARD ── */
  #dashboard { display: none; min-height: 100vh; background: var(--grey-light); }

  .topbar {
    background: var(--navy);
    padding: 0 32px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-logo { display: flex; align-items: center; gap: 10px; }
  .topbar-gamma {
    width: 34px; height: 34px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 18px; font-weight: 700;
  }
  .topbar-name { font-size: 16px; font-weight: 700; color: white; }
  .topbar-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.15); }

  .role-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .role-directie  { background: rgba(232,80,10,0.2); color: #fca97a; border: 1px solid rgba(232,80,10,0.3); }
  .role-makelaar  { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.25); }
  .role-compliance{ background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
  .role-kandidaat { background: rgba(124,58,237,0.15); color: #c4b5fd; border: 1px solid rgba(124,58,237,0.25); }
  .role-trainee   { background: rgba(232,80,10,0.15); color: #fca97a; border: 1px solid rgba(232,80,10,0.25); }

  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .user-pill {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px 6px 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 24px;
  }
  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--orange);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .user-name { font-size: 13px; font-weight: 500; }
  .logout-btn {
    background: none; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 6px 14px;
    color: rgba(255,255,255,0.6); font-family: 'Roboto', sans-serif;
    font-size: 13px; cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: rgba(255,255,255,0.35); color: white; }

  .dashboard-body {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px 60px;
  }

  .welcome-block {
    margin-bottom: 40px;
    animation: fadeUp 0.4s ease both;
  }
  .welcome-greeting {
    font-size: 28px; font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .welcome-greeting span { color: var(--orange); }
  .welcome-sub { font-size: 15px; color: var(--grey-text); }

  .section-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--grey-text);
    margin-bottom: 16px;
    margin-top: 36px;
  }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .module-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--grey-mid);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }
  .module-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--navy));
    border-radius: 16px 16px 0 0;
  }
  .module-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(26,43,95,0.12);
    border-color: transparent;
  }

  .card-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 16px; font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--grey-text);
    line-height: 1.5;
  }
  .card-footer {
    margin-top: 18px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-status {
    font-size: 11px; font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .status-live    { background: #d1fae5; color: #065f46; }
  .status-build   { background: #fef3c7; color: #92400e; }
  .status-concept { background: #ede9fe; color: #4c1d95; }

  .card-arrow {
    font-size: 18px;
    color: var(--grey-text);
    transition: transform 0.2s, color 0.2s;
  }
  .module-card:hover .card-arrow { transform: translateX(4px); color: var(--orange); }

  /* staggered animation delays */
  .module-card:nth-child(1) { animation-delay: 0.05s; }
  .module-card:nth-child(2) { animation-delay: 0.10s; }
  .module-card:nth-child(3) { animation-delay: 0.15s; }
  .module-card:nth-child(4) { animation-delay: 0.20s; }
  .module-card:nth-child(5) { animation-delay: 0.25s; }
  .module-card:nth-child(6) { animation-delay: 0.30s; }

  /* directie-only block */
  .directie-section {
    margin-top: 0;
    padding: 28px;
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    border-radius: 16px;
    animation: fadeUp 0.4s 0.3s ease both;
  }
  .directie-section .section-label { color: rgba(255,255,255,0.45); margin-top: 0; }
  .directie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 16px; }
  .directie-item {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; gap: 12px;
  }
  .directie-item:hover { background: rgba(255,255,255,0.13); }
  .directie-item-icon { font-size: 20px; }
  .directie-item-text { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.85); }

  /* kandidaat single card */
  .kandidaat-hero {
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    animation: fadeUp 0.4s 0.1s ease both;
  }
  .kandidaat-hero .hero-icon { font-size: 48px; margin-bottom: 16px; }
  .kandidaat-hero h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .kandidaat-hero p  { font-size: 15px; color: rgba(255,255,255,0.55); margin-bottom: 28px; }
  .kandidaat-btn {
    display: inline-block;
    background: var(--orange);
    color: white;
    padding: 14px 32px;
    border-radius: 10px;
    font-weight: 700; font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .kandidaat-btn:hover { background: var(--orange-light); }

  /* ── IFRAME OVERLAY ── */
  .iframe-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: white;
    flex-direction: column;
  }
  .iframe-overlay.open { display: flex; }
  .iframe-bar {
    background: var(--navy);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 3px solid var(--orange);
  }
  .iframe-bar-left { display: flex; align-items: center; gap: 12px; }
  .iframe-bar-title { color: white; font-size: 14px; font-weight: 700; }
  .iframe-back-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 6px 14px;
    border-radius: 7px;
    font-family: 'Roboto', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .iframe-back-btn:hover { background: var(--orange); border-color: var(--orange); }
  .iframe-frame {
    flex: 1;
    border: none;
    width: 100%;
  }

</style>
</head>

  btn.disabled = true;

  // Login via Supabase Auth
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

  if (error) {
    err.textContent = 'Onbekende gebruiker of onjuist wachtwoord.';
    err.style.display = 'block';
    btn.textContent = 'Inloggen';
    btn.disabled = false;
    return;
  }

  // Haal gebruikersprofiel op uit gebruikers tabel
  const { data: profiel, error: profielError } = await sb
    .from('gebruikers')
    .select('naam, level')
    .eq('email', email)
    .single();

  if (profielError || !profiel) {
    err.textContent = 'Gebruikersprofiel niet gevonden. Neem contact op met de beheerder.';
    err.style.display = 'block';
    btn.textContent = 'Inloggen';
    btn.disabled = false;
    return;
  }

  err.style.display = 'none';
  btn.textContent = 'Inloggen';
  btn.disabled = false;

  renderDashboard({ name: profiel.naam, role: profiel.level });
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('email-input').value = '';
  document.getElementById('password-input').value = '';
}

// Check of al ingelogd bij laden pagina
window.addEventListener('load', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: profiel } = await sb
      .from('gebruikers')
      .select('naam, level')
      .eq('email', session.user.email)
      .single();
    if (profiel) {
      renderDashboard({ name: profiel.naam, role: profiel.level });
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
    }
  }
});

function renderDashboard(user) {
  // topbar
  const roleBadge = document.getElementById('role-badge');
  roleBadge.textContent = user.role.charAt(0).toUpperCase() + user.role.slice(1);
  roleBadge.className = 'role-badge role-' + user.role;

  const initials = user.name.split(' ').map(w => w[0]).slice(0,2).join('');
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name-display').textContent = user.name;

  const body = document.getElementById('dashboard-body');
  const firstName = user.name.split(' ')[0];

  if (user.role === 'kandidaat') {
    body.innerHTML = `
      <div class="welcome-block">
        <div class="welcome-greeting">Welkom, <span>${firstName}</span> 👋</div>
        <div class="welcome-sub">Goed dat je er bent. Hier start jouw kennismaking met MakelaarsVan Amsterdam.</div>
      </div>
      <div class="kandidaat-hero">
        <div class="hero-icon">🧬</div>
        <h2>GNOTHI Profielscan</h2>
        <p>Voordat we beginnen willen we je beter leren kennen.<br>De scan duurt ongeveer 5 minuten.</p>
        <div class="kandidaat-btn" onclick="window.open('https://a-c-e-s-test.netlify.app','_blank')">Start de profielscan →</div>
      </div>
    `;
    return;
  }

  // Trainee ziet dezelfde layout als makelaar maar met andere modules
  const data = MODULES[user.role] || MODULES['makelaar'];
  let html = `
    <div class="welcome-block">
      <div class="welcome-greeting">Goedemiddag, <span>${firstName}</span> 👋</div>
      <div class="welcome-sub">Jouw modules zijn beschikbaar. Klik op een kaart om te openen.</div>
    </div>
  `;

  if (data.primary) {
    html += `<div class="section-label">Jouw modules</div><div class="modules-grid">`;
    data.primary.forEach(m => {
      const statusLabel = m.status === 'live' ? 'Live' : m.status === 'build' ? 'In opbouw' : 'Concept';
      const statusClass = m.status === 'live' ? 'status-live' : m.status === 'build' ? 'status-build' : 'status-concept';
      html += `
        <div class="module-card" style="--card-accent:${m.accent}" onclick="openModule('${m.title}', '${m.url}')">
          <div class="card-icon" style="background:${m.bg}">${m.icon}</div>
          <div class="card-title">${m.title}</div>
          <div class="card-desc">${m.desc}</div>
          <div class="card-footer">
            <span class="card-status ${statusClass}">${statusLabel}</span>
            <span class="card-arrow">→</span>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  if (user.role === 'directie' && data.restricted) {
    html += `
      <div class="section-label" style="margin-top:36px">Directie-only toegang</div>
      <div class="directie-section">
        <div class="directie-grid">
    `;
    data.restricted.forEach(r => {
      html += `
        <div class="directie-item">
          <div class="directie-item-icon">${r.icon}</div>
          <div class="directie-item-text">${r.title}</div>
        </div>
      `;
    });
    html += `</div></div>`;
  }

  body.innerHTML = html;
}

function openModule(titel, url) {
  if (!url || url === '#') {
    alert('Deze module is nog niet beschikbaar.');
    return;
  }
  if (url.includes('a-c-e-s') || url.includes('jotform')) {
    window.open(url, '_blank');
    return;
  }
  // Voeg SSO token toe aan URL zodat de tool automatisch inlogt
  const sessieRaw = localStorage.getItem('sb-ehqtyhoeubchcwfavdzr-auth-token');
  let finalUrl = url;
  if (sessieRaw) {
    try {
      const sessie = JSON.parse(sessieRaw);
      if (sessie && sessie.access_token) {
        const tokenPayload = btoa(JSON.stringify({
          access_token: sessie.access_token,
          email: sessie.user?.email,
          ts: Date.now()
        }));
        finalUrl = url + (url.includes('?') ? '&' : '?') + 'sso=' + encodeURIComponent(tokenPayload);
      }
    } catch(e) {}
  }
  window.open(finalUrl, '_blank');
}

function sluitModule() {
  document.getElementById('iframe-overlay').classList.remove('open');
  document.getElementById('iframe-frame').src = '';
}
